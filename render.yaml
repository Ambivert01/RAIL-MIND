## RailMind — Render Blueprint
## ─────────────────────────────────────────────────────────────────────────────
## One-click deploy: https://render.com/deploy
##
## EXTERNAL SERVICES (provision these first, then fill in sync: false vars):
##   1. Neo4j AuraDB Free  → https://console.neo4j.io
##      Set: NEO4J_URI, NEO4J_PASSWORD
##   2. Qdrant Cloud Free  → https://cloud.qdrant.io
##      Set: QDRANT_URL, QDRANT_API_KEY
##   3. Upstash Redis Free → https://upstash.com
##      Set: REDIS_URL (use rediss:// TLS URL)
##   4. (Optional) OpenAI  → https://platform.openai.com/api-keys
##      Set: OPENAI_API_KEY
## ─────────────────────────────────────────────────────────────────────────────

services:
  # ─── Backend API (NestJS) ────────────────────────────────────────────────────
  - type: web
    name: railmind-api
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: >-
      npm install -g pnpm@8.15.9 &&
      NODE_ENV=development pnpm install --frozen-lockfile &&
      pnpm --filter @railmind/shared-types build &&
      cd services/api &&
      node_modules/.bin/prisma generate &&
      node_modules/.bin/prisma db push &&
      node_modules/.bin/nest build
    startCommand: cd services/api && node dist/main
    healthCheckPath: /api/v1/health
    buildFilter:
      paths:
        - services/api/**
        - packages/shared-types/**
        - pnpm-lock.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        sync: false
      - key: REDIS_URL
        sync: false
      - key: NEO4J_URI
        sync: false
      - key: NEO4J_USER
        value: neo4j
      - key: NEO4J_PASSWORD
        sync: false
      - key: QDRANT_URL
        sync: false
      - key: QDRANT_API_KEY
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRY
        value: 7d
      - key: REFRESH_TOKEN_EXPIRY
        value: 30d
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: FRONTEND_URL
        sync: false

  # ─── Frontend (Next.js) ──────────────────────────────────────────────────────
  - type: web
    name: railmind-web
    runtime: node
    plan: free
    region: oregon
    rootDir: .
    buildCommand: >-
      npm install -g pnpm@8.15.9 &&
      NODE_ENV=development pnpm install --frozen-lockfile &&
      pnpm --filter @railmind/shared-types build &&
      pnpm --filter web build
    startCommand: cd apps/web && node_modules/.bin/next start -p $PORT
    buildFilter:
      paths:
        - apps/web/**
        - packages/shared-types/**
        - pnpm-lock.yaml
    envVars:
      - key: NODE_ENV
        value: production
      - key: NEXT_PUBLIC_API_URL
        sync: false
      - key: NEXT_PUBLIC_WS_URL
        sync: false
      - key: NEXT_PUBLIC_MAPBOX_TOKEN
        sync: false

databases:
  - name: railmind-postgres
    plan: free
    region: oregon
    databaseName: railmind
    user: railmind
